<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="favicon.png">
    <title>Pick Up The Cake</title>
    <meta name="description" content="Pick Up The Cake is a music label founded by mvrgn and Arsider Cam.">
    <link rel="canonical" href="https://pickupthecake.xyz/" />
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </noscript>
    <link rel="stylesheet" href="css/styles.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MusicGroup",
      "name": "Pick Up The Cake",
      "alternateName": "PUTC",
      "url": "https://pickupthecake.xyz",
      "logo": "https://pickupthecake.xyz/favicon.png",
      "description": "Pick Up The Cake is an independent music label founded by mvrgn and Arsider Cam, focused on electronic and experimental sounds.",
      "genre": ["Electronic", "Experimental", "Ambient"],
      "sameAs": [
        "https://pickupthecake.bandcamp.com/",
        "https://www.instagram.com/pickupthecake_/",
        "https://www.ninaprotocol.com/profiles/pickupthecake",
        "https://soundcloud.com/pickupthecake" 
      ],
      "founder": [
        {
          "@type": "Person",
          "name": "mvrgn"
        },
        {
          "@type": "Person",
          "name": "Arsider Cam"
        }
      ],
      "hasPart": [
        { 
          "@type": "MusicAlbum", 
          "name": "L'uomo Corteccia", 
          "byArtist": { "@type": "MusicGroup", "name": "Kabiro" },
          "url": "https://pickupthecake.xyz/003-luomo-corteccia.html" 
        },
        { 
          "@type": "MusicAlbum", 
          "name": "Espedienti", 
          "byArtist": [
            { "@type": "Person", "name": "Robert Bishop" },
            { "@type": "Person", "name": "lillilillililli" },
            { "@type": "Person", "name": "Carro" }
          ],
          "url": "https://pickupthecake.xyz/002-espedienti.html" 
        },
        { 
          "@type": "MusicAlbum", 
          "name": "Live in Italy", 
          "byArtist": { "@type": "MusicGroup", "name": "Jan Jizz Trio" },
          "url": "https://pickupthecake.xyz/001-live-in-italy.html" 
        }
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "itemListElement": [
        {
          "@type": "SiteNavigationElement",
          "position": 1,
          "name": "Releases",
          "url": "https://pickupthecake.xyz/releases.html"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 2,
          "name": "Residency",
          "url": "https://pickupthecake.xyz/residency.html"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 3,
          "name": "About",
          "url": "https://pickupthecake.xyz/about.html"
        }
      ]
    }
    </script>
</head>

<body>

    <nav class="navbar-main">
        <div class="navbar-left">
            <a href="index.html"><img src="symbol.webp" width="50" height="50" alt="PUTC Logo - Pick Up The Cake"></a>
        </div>
        <div class="hamburger" id="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <div class="navbar-right" id="navbar-right">
            <a href="releases.html" class="nav-item">RELEASES</a>
            <a href="residency.html" class="nav-item">RESIDENCY</a>
            <a href="about.html#about" class="nav-item">ABOUT</a>
            <a href="about.html#contact" class="nav-item">CONTACT</a>
            <a href="about.html#support" class="nav-item">SUPPORT US</a>
        </div>
    </nav>

    <!-- Desktop -->
    <div class="images-container">
        <div class="image-box2">
            <a href="003-luomo-corteccia.html">
                <img src="ARWORK/kabritoArt.webp" width="300" height="300" fetchpriority="high" alt="L'uomo corteccia">
            </a>
        </div>
        <div class="image-box2">
            <a href="002-espedienti.html">
                <img src="ARWORK/Espedienti.webp" width="300" height="300" fetchpriority="high" alt="Espedienti">
            </a>
        </div>
        <div class="image-box01">
            <a href="001-live-in-italy.html">
                <img src="ARWORK/sofacoveer2.webp" width="300" height="300" alt="Live In Italy">
            </a>
        </div>
    </div>

    <!-- Mobile snap scroll -->
    <div class="mobile-snap-container">
        <div class="snap-slide">
            <a href="003-luomo-corteccia.html">
                <img src="ARWORK/kabritoArt.webp" alt="L'uomo corteccia">
            </a>
            <div class="scroll-hint">
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
        <div class="snap-slide">
            <a href="002-espedienti.html">
                <img src="ARWORK/Espedienti.webp" alt="Espedienti">
            </a>
            <div class="scroll-hint">
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
        <div class="snap-slide">
            <a href="001-live-in-italy.html">
                <img src="ARWORK/sofacoveer2.webp" alt="Live In Italy">
            </a>
        </div>
    </div>

    <div class="bottom-player">
        <div class="custom-player">
            <div class="controls">
                <div class="control-container">
                    <div class="control-button" onclick="previousSong('bottom')">
                        <i class="fas fa-step-backward"></i>
                    </div>
                </div>
                <div class="control-container">
                    <div class="control-button" onclick="togglePlay('bottom')">
                        <i class="fas fa-play" id="bottom-play-pause"></i>
                    </div>
                </div>
                <div class="control-container">
                    <div class="control-button" onclick="nextSong('bottom')">
                        <i class="fas fa-step-forward"></i>
                    </div>
                </div>
            </div>
            <div class="track-info">
                <div class="song-info">
                    <div class="title-row">
                        <span class="song-title" id="bottom-song-title">Select a song</span>
                        <span class="artist-name" id="bottom-artist-name"></span>
                    </div>
                    <div class="time-row">
                        <span id="bottom-current-time">0:00</span>
                        <span>/</span>
                        <span id="bottom-duration">0:00</span>
                    </div>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="bottom-progress-bar" onclick="seek(event, 'bottom')">
                    <div class="progress" id="bottom-progress"></div>
                </div>
            </div>
            <div class="volume-container">
                <i class="fas fa-volume-up" onclick="toggleMute('bottom')"></i>
                <input type="range" id="bottom-volume" min="0" max="1" step="0.1" value="1"
                    oninput="setVolume('bottom', this.value)">
            </div>
        </div>
    </div>

    <audio id="bottomAudio" onended="songEnded('bottom')" ontimeupdate="updateProgress('bottom')"></audio>

    <script src="js/scripts.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('hamburger').classList.toggle('active');
            document.getElementById('navbar-right').classList.toggle('active');
        }
    </script>

</body>

</html>
