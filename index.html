<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" sizes="32x32" href="artworw-purp.webp">
    <title>Pick Up The Cake</title>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </noscript>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <nav class="navbar-main">
        <div class="navbar-left">
            <a href="index.html"><img src="symbol.webp" width="50" height="50" alt="Symbol"></a>
        </div>
        <div class="hamburger" id="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <div class="navbar-right" id="navbar-right">
            <a href="releases.html" class="nav-item">RELEASES</a>
            <a href="residency.html" class="nav-item">RESIDENCY</a>
            <a href="about2.html#about" class="nav-item">ABOUT</a>
            <a href="about2.html#contact" class="nav-item">CONTACT</a>
            <a href="about2.html#support" class="nav-item">SUPPORT US</a>
        </div>
    </nav>

    <!-- Desktop -->
    <div class="images-container">
        <div class="image-box2">
            <a href="release03.html">
                <img src="ARWORK/kabritoArt.webp" width="300" height="300" fetchpriority="high" alt="L'uomo corteccia">
            </a>
        </div>
        <div class="image-box2">
            <a href="release02.html">
                <img src="ARWORK/Espedienti.webp" width="300" height="300" fetchpriority="high" alt="Espedienti">
            </a>
        </div>
        <div class="image-box01">
            <a href="release01.html">
                <img src="ARWORK/sofacoveer2.webp" width="300" height="300" alt="Live In Italy">
            </a>
        </div>
    </div>

    <!-- Mobile snap scroll -->
    <div class="mobile-snap-container">
        <div class="snap-slide">
            <a href="release02.html">
                <img src="ARWORK/Espedienti.webp" alt="Espedienti">
            </a>
            <div class="scroll-hint">
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
        <div class="snap-slide">
            <a href="release01.html">
                <img src="ARWORK/sofacoveer2.webp" alt="Live In Italy">
            </a>
        </div>
    </div>

    <div class="bottom-player">
        <div class="custom-player">
            <div class="controls">
                <div class="control-container">
                    <div class="control-button" onclick="previousSong('bottom')">
                        <i class="fas fa-step-backward"></i>
                    </div>
                </div>
                <div class="control-container">
                    <div class="control-button" onclick="togglePlay('bottom')">
                        <i class="fas fa-play" id="bottom-play-pause"></i>
                    </div>
                </div>
                <div class="control-container">
                    <div class="control-button" onclick="nextSong('bottom')">
                        <i class="fas fa-step-forward"></i>
                    </div>
                </div>
            </div>
            <div class="track-info">
                <div class="song-info">
                    <div class="title-row">
                        <span class="song-title" id="bottom-song-title">Select a song</span>
                        <span class="artist-name" id="bottom-artist-name"></span>
                    </div>
                    <div class="time-row">
                        <span id="bottom-current-time">0:00</span>
                        <span>/</span>
                        <span id="bottom-duration">0:00</span>
                    </div>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="bottom-progress-bar" onclick="seek(event, 'bottom')">
                    <div class="progress" id="bottom-progress"></div>
                </div>
            </div>
            <div class="volume-container">
                <i class="fas fa-volume-up" onclick="toggleMute('bottom')"></i>
                <input type="range" id="bottom-volume" min="0" max="1" step="0.1" value="1"
                    oninput="setVolume('bottom', this.value)">
            </div>
        </div>
    </div>

    <audio id="bottomAudio" onended="songEnded('bottom')" ontimeupdate="updateProgress('bottom')"></audio>

    <script src="js/scripts.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('hamburger').classList.toggle('active');
            document.getElementById('navbar-right').classList.toggle('active');
        }
    </script>

</body>

</html>
