name: Generate XML Sitemap

on:
  push:
    branches:
      - main # Cambia in 'master' se la tua branch principale si chiama così

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    name: Generate Sitemap
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://pickupthecake.xyz
          path-to-root: .
          additional-extensions: html
          drop-extension: false # Mantieni .html come abbiamo deciso

      - name: Commit and push sitemap
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add sitemap.xml
          git commit -m "Automated sitemap update" || echo "No changes to commit"
          git push
